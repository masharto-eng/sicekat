<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SI-CEKAT — SMAN 1 Balongpanggang</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Plus Jakarta Sans',sans-serif;}
  body{background:#f3f4f6;min-height:100vh;}
  .animate-in{animation:slideUp .35s ease both;}
  @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .card-hover{transition:all .2s;}
  .card-hover:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.11);}
  input,textarea,select{font-family:inherit;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:#f1f1f1;}
  ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px;}
  .pulse{animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  table{border-collapse:collapse;width:100%;}
  th,td{text-align:left;}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ─── ADMIN PASSWORD (ganti sesuai keinginan) ───
const ADMIN_PASSWORD = "sicekat2026";

const TICKETS_CONTOH = [
  { id:"SCK-2026-001", reporter:"Ahmad Fauzi", role:"Siswa", category:"Sarpras", description:"Proyektor di kelas XII IPA 2 tidak menyala sejak 3 hari lalu", room:"XII IPA 2", status:"Selesai", created:"2026-02-10", rating:5, ratingNote:"Penanganan cepat dan profesional!", assignee:"Pak Hartono (IT)" },
  { id:"SCK-2026-002", reporter:"Siti Rahayu", role:"Guru", category:"Administrasi", description:"Surat keterangan aktif belum bisa diproses karena data di sistem belum update", room:"TU", status:"Dalam Pengerjaan", created:"2026-02-20", rating:null, ratingNote:"", assignee:"Bu Dewi (TU)" },
  { id:"SCK-2026-003", reporter:"Budi Santoso", role:"Wali Murid", category:"Kesiswaan", description:"Anak saya (Rizky/XI IPS 1) belum mendapatkan informasi jadwal remedial", room:"XI IPS 1", status:"Diverifikasi", created:"2026-02-24", rating:null, ratingNote:"", assignee:null },
  { id:"SCK-2026-004", reporter:"Dewi Lestari", role:"Siswa", category:"Sarpras", description:"AC di ruang lab komputer bocor dan airnya menetes ke lantai", room:"Lab Komputer", status:"Terkirim", created:"2026-02-26", rating:null, ratingNote:"", assignee:null },
];

const STATUS_FLOW = ["Terkirim","Diverifikasi","Dalam Pengerjaan","Selesai"];
const STATUS_STYLE = {
  "Terkirim":{bg:"#dbeafe",text:"#1d4ed8",dot:"#3b82f6"},
  "Diverifikasi":{bg:"#fef9c3",text:"#a16207",dot:"#eab308"},
  "Dalam Pengerjaan":{bg:"#ffedd5",text:"#c2410c",dot:"#f97316"},
  "Selesai":{bg:"#dcfce7",text:"#15803d",dot:"#22c55e"},
};
const CAT_ICON = {Sarpras:"🏗️",Kesiswaan:"👨‍🎓",Administrasi:"📋"};
const ROLE_ICON = {Siswa:"🎒",Guru:"👩‍🏫","Wali Murid":"👨‍👩‍👧"};

function genId(){
  const now = new Date();
  return `SCK-${now.getFullYear()}-${String(Math.floor(Math.random()*900)+100).padStart(3,"0")}`;
}
function todayStr(){return new Date().toISOString().split("T")[0];}

// ─── SIMPAN & BACA dari localStorage ───
function saveTickets(data){ localStorage.setItem("sicekat_tickets", JSON.stringify(data)); }
function loadTickets(){
  try{
    const d = localStorage.getItem("sicekat_tickets");
    return d ? JSON.parse(d) : TICKETS_CONTOH;
  }catch(e){ return TICKETS_CONTOH; }
}

function StatusBadge({status}){
  const s = STATUS_STYLE[status]||{bg:"#f3f4f6",text:"#6b7280",dot:"#9ca3af"};
  return <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",borderRadius:99,background:s.bg,color:s.text,fontSize:11,fontWeight:700}}>
    <span style={{width:7,height:7,borderRadius:"50%",background:s.dot,display:"inline-block"}}></span>{status}
  </span>;
}

function ProgressBar({status}){
  const idx = STATUS_FLOW.indexOf(status);
  return <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:2}}>
    {STATUS_FLOW.map((s,i)=>{
      const done=i<=idx,active=i===idx;
      return <React.Fragment key={s}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div style={{width:30,height:30,borderRadius:"50%",border:`2px solid ${done?"#b91c1c":"#d1d5db"}`,background:done?"#b91c1c":"white",color:done?"white":"#9ca3af",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,boxShadow:active?"0 0 0 4px #fecaca":"none"}}>
            {done?"✓":i+1}
          </div>
          <span style={{fontSize:9,marginTop:3,fontWeight:600,color:done?"#b91c1c":"#9ca3af",width:60,textAlign:"center",lineHeight:1.2}}>{s}</span>
        </div>
        {i<STATUS_FLOW.length-1&&<div style={{width:24,height:2,background:i<idx?"#b91c1c":"#e5e7eb",marginBottom:14,flexShrink:0}}></div>}
      </React.Fragment>;
    })}
  </div>;
}

function Stars({value,onChange}){
  const [hover,setHover]=useState(0);
  return <div style={{display:"flex",gap:3}}>
    {[1,2,3,4,5].map(s=><button key={s} type="button" onClick={()=>onChange&&onChange(s)}
      onMouseEnter={()=>onChange&&setHover(s)} onMouseLeave={()=>onChange&&setHover(0)}
      style={{fontSize:26,background:"none",border:"none",cursor:onChange?"pointer":"default",color:(hover||value)>=s?"#facc15":"#d1d5db"}}>★</button>)}
  </div>;
}

function Notif({msg,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t);},[]);
  return <div style={{position:"fixed",top:16,right:16,zIndex:9999,padding:"12px 18px",borderRadius:14,background:type==="error"?"#dc2626":type==="warn"?"#d97706":"#16a34a",color:"white",fontWeight:700,fontSize:13,boxShadow:"0 8px 24px rgba(0,0,0,.2)",display:"flex",alignItems:"center",gap:8,animation:"slideUp .3s ease",maxWidth:320}}>
    {type==="error"?"⚠️":type==="warn"?"⚠️":"✅"} {msg}
  </div>;
}

// ─── MODAL KONFIRMASI HAPUS ───
function ConfirmModal({onConfirm,onCancel,ticketId}){
  return <div className="modal-bg" onClick={onCancel}>
    <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:20,padding:28,maxWidth:380,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
      <div style={{fontSize:48,marginBottom:12}}>🗑️</div>
      <div style={{fontWeight:800,fontSize:17,color:"#1f2937",marginBottom:8}}>Hapus Tiket?</div>
      <div style={{fontSize:13,color:"#6b7280",marginBottom:6}}>Tiket <strong style={{fontFamily:"monospace",color:"#b91c1c"}}>{ticketId}</strong> akan dihapus permanen.</div>
      <div style={{fontSize:12,color:"#9ca3af",marginBottom:22}}>Tindakan ini tidak dapat dibatalkan.</div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={onCancel} style={{flex:1,padding:"11px",borderRadius:12,border:"2px solid #e5e7eb",background:"white",fontWeight:700,fontSize:13,cursor:"pointer",color:"#374151"}}>Batal</button>
        <button onClick={onConfirm} style={{flex:1,padding:"11px",borderRadius:12,border:"none",background:"#dc2626",color:"white",fontWeight:700,fontSize:13,cursor:"pointer"}}>Ya, Hapus</button>
      </div>
    </div>
  </div>;
}

// ─── MODAL UBAH STATUS ───
function StatusModal({ticket,onSave,onCancel}){
  const [status,setStatus]=useState(ticket.status);
  const [assignee,setAssignee]=useState(ticket.assignee||"");
  const inp={border:"2px solid #e5e7eb",borderRadius:12,padding:"10px 14px",fontSize:13,width:"100%",outline:"none",fontFamily:"inherit"};
  return <div className="modal-bg" onClick={onCancel}>
    <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:20,padding:24,maxWidth:440,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
      <div style={{fontWeight:800,fontSize:16,color:"#1f2937",marginBottom:4}}>✏️ Edit Tiket</div>
      <div style={{fontSize:11,fontFamily:"monospace",color:"#9ca3af",marginBottom:16}}>{ticket.id}</div>
      
      <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:8}}>Ubah Status</div>
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
        {STATUS_FLOW.map(s=>{
          const st=STATUS_STYLE[s];
          return <button key={s} onClick={()=>setStatus(s)}
            style={{padding:"10px 14px",borderRadius:12,border:`2px solid ${status===s?st.dot:"#e5e7eb"}`,background:status===s?st.bg:"white",color:status===s?st.text:"#6b7280",fontWeight:700,fontSize:13,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:8,transition:"all .15s"}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:st.dot,display:"inline-block"}}></span>
            {s} {status===s&&"✓"}
          </button>;
        })}
      </div>

      <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:6}}>Petugas yang Ditugaskan</div>
      <input style={{...inp,marginBottom:18}} placeholder="Nama petugas & bidang (cth: Pak Hartono - IT)" value={assignee} onChange={e=>setAssignee(e.target.value)}/>

      <div style={{display:"flex",gap:10}}>
        <button onClick={onCancel} style={{flex:1,padding:"11px",borderRadius:12,border:"2px solid #e5e7eb",background:"white",fontWeight:700,fontSize:13,cursor:"pointer",color:"#374151"}}>Batal</button>
        <button onClick={()=>onSave(status,assignee)} style={{flex:1,padding:"11px",borderRadius:12,border:"none",background:"#b91c1c",color:"white",fontWeight:700,fontSize:13,cursor:"pointer"}}>💾 Simpan Perubahan</button>
      </div>
    </div>
  </div>;
}

// ─── MODAL LOGIN ADMIN ───
function LoginModal({onLogin,onCancel}){
  const [pw,setPw]=useState("");
  const [err,setErr]=useState(false);
  const tryLogin=()=>{
    if(pw===ADMIN_PASSWORD){onLogin();}
    else{setErr(true);setTimeout(()=>setErr(false),2000);}
  };
  return <div className="modal-bg" onClick={onCancel}>
    <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:20,padding:28,maxWidth:360,width:"100%",textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
      <div style={{fontSize:48,marginBottom:10}}>🔐</div>
      <div style={{fontWeight:800,fontSize:18,color:"#1f2937",marginBottom:6}}>Login Admin</div>
      <div style={{fontSize:12,color:"#6b7280",marginBottom:18}}>Masukkan password untuk mengakses Panel Admin</div>
      <input type="password" style={{border:`2px solid ${err?"#dc2626":"#e5e7eb"}`,borderRadius:12,padding:"11px 14px",fontSize:14,width:"100%",outline:"none",marginBottom:6,textAlign:"center",letterSpacing:4,fontFamily:"inherit"}}
        placeholder="••••••••" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryLogin()} autoFocus/>
      {err&&<div style={{fontSize:12,color:"#dc2626",marginBottom:10,fontWeight:600}}>Password salah! Coba lagi.</div>}
      {!err&&<div style={{height:16,marginBottom:4}}></div>}
      <div style={{display:"flex",gap:10,marginTop:8}}>
        <button onClick={onCancel} style={{flex:1,padding:"11px",borderRadius:12,border:"2px solid #e5e7eb",background:"white",fontWeight:700,fontSize:13,cursor:"pointer",color:"#374151"}}>Batal</button>
        <button onClick={tryLogin} style={{flex:1,padding:"11px",borderRadius:12,border:"none",background:"#b91c1c",color:"white",fontWeight:700,fontSize:13,cursor:"pointer"}}>🔓 Masuk</button>
      </div>
    </div>
  </div>;
}

function App(){
  const [tickets,setTickets]=useState(()=>loadTickets());
  const [view,setView]=useState("home");
  const [form,setForm]=useState({reporter:"",role:"Siswa",category:"Sarpras",room:"",description:""});
  const [submitted,setSubmitted]=useState(null);
  const [trackId,setTrackId]=useState("");
  const [trackResult,setTrackResult]=useState(null);
  const [adminSel,setAdminSel]=useState(null);
  const [adminFilter,setAdminFilter]=useState("Semua");
  const [ratingMode,setRatingMode]=useState({id:null,stars:0,note:""});
  const [notif,setNotif]=useState(null);
  // Admin state
  const [adminLoggedIn,setAdminLoggedIn]=useState(false);
  const [showLogin,setShowLogin]=useState(false);
  const [showConfirmDelete,setShowConfirmDelete]=useState(null);
  const [showStatusModal,setShowStatusModal]=useState(null);

  // Simpan ke localStorage setiap kali tickets berubah
  useEffect(()=>{ saveTickets(tickets); },[tickets]);

  const showNotif=(msg,type="success")=>setNotif({msg,type});

  const nav=(v)=>{
    if(v==="admin"&&!adminLoggedIn){ setShowLogin(true); return; }
    setView(v); setAdminSel(null); setTrackResult(null);
  };

  const handleLogin=()=>{ setAdminLoggedIn(true); setShowLogin(false); setView("admin"); };
  const handleLogout=()=>{ setAdminLoggedIn(false); setView("home"); };

  const submitReport=()=>{
    if(!form.reporter||!form.description||!form.room){showNotif("Lengkapi semua field!","error");return;}
    const t={id:genId(),...form,status:"Terkirim",created:todayStr(),rating:null,ratingNote:"",assignee:null};
    const updated=[t,...tickets];
    setTickets(updated);
    setSubmitted(t);
    setView("submitted");
    setForm({reporter:"",role:"Siswa",category:"Sarpras",room:"",description:""});
  };

  const deleteTicket=(id)=>{
    const updated=tickets.filter(t=>t.id!==id);
    setTickets(updated);
    setShowConfirmDelete(null);
    setAdminSel(null);
    showNotif("Tiket berhasil dihapus!");
  };

  const saveTicketEdit=(id,newStatus,newAssignee)=>{
    const updated=tickets.map(t=>t.id===id?{...t,status:newStatus,assignee:newAssignee||null}:t);
    setTickets(updated);
    setShowStatusModal(null);
    showNotif("Tiket berhasil diperbarui! ✅");
  };

  const submitRating=(id)=>{
    if(!ratingMode.stars){showNotif("Pilih rating dulu!","error");return;}
    const updated=tickets.map(t=>t.id===id?{...t,rating:ratingMode.stars,ratingNote:ratingMode.note}:t);
    setTickets(updated);
    setRatingMode({id:null,stars:0,note:""});
    showNotif("Terima kasih atas penilaian Anda! 🌟");
  };

  const filtered = adminFilter==="Semua"?tickets:tickets.filter(t=>t.status===adminFilter);
  const stats={
    total:tickets.length,
    terkirim:tickets.filter(t=>t.status==="Terkirim").length,
    proses:tickets.filter(t=>["Diverifikasi","Dalam Pengerjaan"].includes(t.status)).length,
    selesai:tickets.filter(t=>t.status==="Selesai").length,
    avgRating:(tickets.filter(t=>t.rating).reduce((a,b)=>a+b.rating,0)/(tickets.filter(t=>t.rating).length||1)).toFixed(1)
  };
  const selTicket=adminSel?tickets.find(t=>t.id===adminSel):null;

  const card={background:"white",borderRadius:20,boxShadow:"0 2px 12px rgba(0,0,0,.07)",overflow:"hidden"};
  const btn=(bg,col="#fff")=>({background:bg,color:col,border:"none",borderRadius:12,padding:"11px 20px",fontWeight:700,fontSize:13,cursor:"pointer",transition:"opacity .2s"});
  const inp={border:"2px solid #e5e7eb",borderRadius:12,padding:"10px 14px",fontSize:13,width:"100%",outline:"none",transition:"border-color .2s",fontFamily:"inherit"};
  const lbl={display:"block",fontSize:13,fontWeight:700,color:"#374151",marginBottom:6};
  const sec={maxWidth:900,margin:"0 auto",padding:"20px 16px"};

  return <>
    {notif&&<Notif msg={notif.msg} type={notif.type} onClose={()=>setNotif(null)}/>}
    {showLogin&&<LoginModal onLogin={handleLogin} onCancel={()=>setShowLogin(false)}/>}
    {showConfirmDelete&&<ConfirmModal ticketId={showConfirmDelete} onConfirm={()=>deleteTicket(showConfirmDelete)} onCancel={()=>setShowConfirmDelete(null)}/>}
    {showStatusModal&&<StatusModal ticket={showStatusModal} onSave={(s,a)=>saveTicketEdit(showStatusModal.id,s,a)} onCancel={()=>setShowStatusModal(null)}/>}

    {/* HEADER */}
    <div style={{background:"linear-gradient(135deg,#991b1b,#b91c1c)",color:"white",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 16px rgba(0,0,0,.2)"}}>
      <div style={{maxWidth:900,margin:"0 auto",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <button onClick={()=>nav("home")} style={{display:"flex",alignItems:"center",gap:10,background:"none",border:"none",cursor:"pointer",color:"white"}}>
          <div style={{width:40,height:40,background:"rgba(255,255,255,.2)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>⚡</div>
          <div style={{textAlign:"left"}}>
            <div style={{fontWeight:900,fontSize:18,lineHeight:1}}>SI-CEKAT</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,.7)",lineHeight:1.2}}>SMAN 1 Balongpanggang</div>
          </div>
        </button>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
          {[["home","🏠"],["report","📝 Lapor"],["track","🔍 Cek"],["dashboard","📊 Dashboard"]].map(([k,l])=>(
            <button key={k} onClick={()=>nav(k)} style={{padding:"7px 12px",borderRadius:10,border:"none",fontSize:12,fontWeight:700,cursor:"pointer",background:view===k?"white":"rgba(255,255,255,.15)",color:view===k?"#b91c1c":"rgba(255,255,255,.9)"}}>{l}</button>
          ))}
          {adminLoggedIn
            ? <div style={{display:"flex",gap:4,alignItems:"center"}}>
                <button onClick={()=>nav("admin")} style={{padding:"7px 12px",borderRadius:10,border:"none",fontSize:12,fontWeight:700,cursor:"pointer",background:view==="admin"?"white":"rgba(255,255,255,.15)",color:view==="admin"?"#b91c1c":"rgba(255,255,255,.9)"}}>⚙️ Admin</button>
                <button onClick={handleLogout} style={{padding:"7px 10px",borderRadius:10,border:"2px solid rgba(255,255,255,.4)",fontSize:11,fontWeight:700,cursor:"pointer",background:"transparent",color:"rgba(255,255,255,.8)"}}>Keluar 🚪</button>
              </div>
            : <button onClick={()=>setShowLogin(true)} style={{padding:"7px 12px",borderRadius:10,border:"2px solid rgba(255,255,255,.4)",fontSize:12,fontWeight:700,cursor:"pointer",background:"transparent",color:"rgba(255,255,255,.9)"}}>🔐 Admin</button>
          }
        </div>
      </div>
    </div>

    <div style={sec}>

    {/* ===== HOME ===== */}
    {view==="home"&&<div className="animate-in">
      <div style={{background:"linear-gradient(135deg,#7f1d1d,#b91c1c)",borderRadius:24,padding:"36px 28px",color:"white",marginBottom:20,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-40,right:-40,width:200,height:200,background:"rgba(255,255,255,.05)",borderRadius:"50%"}}></div>
        <div style={{position:"relative",zIndex:1}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:7,background:"rgba(255,255,255,.15)",borderRadius:99,padding:"4px 12px",fontSize:11,fontWeight:700,marginBottom:14}}>
            <span className="pulse" style={{width:8,height:8,background:"#4ade80",borderRadius:"50%",display:"inline-block"}}></span>
            Sistem Aktif 24/7
          </div>
          <div style={{fontSize:34,fontWeight:900,lineHeight:1.15,marginBottom:8}}>Sistem Informasi<br/>Cepat & Akurat</div>
          <p style={{color:"rgba(255,255,255,.75)",fontSize:13,marginBottom:20,maxWidth:420}}>Platform digital terpadu SMAN 1 Balongpanggang untuk pelaporan dan monitoring masalah sekolah secara transparan.</p>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <button onClick={()=>nav("report")} style={{...btn("white","#b91c1c"),boxShadow:"0 4px 14px rgba(0,0,0,.2)"}}>📝 Buat Laporan</button>
            <button onClick={()=>nav("track")} style={{...btn("rgba(255,255,255,.15)","white"),border:"2px solid rgba(255,255,255,.4)"}}>🔍 Cek Status Tiket</button>
          </div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:20}}>
        {[
          {label:"Total Laporan",value:stats.total,icon:"📋",bg:"linear-gradient(135deg,#2563eb,#3b82f6)"},
          {label:"Menunggu",value:stats.terkirim,icon:"⏳",bg:"linear-gradient(135deg,#d97706,#f59e0b)"},
          {label:"Diproses",value:stats.proses,icon:"🔧",bg:"linear-gradient(135deg,#ea580c,#f97316)"},
          {label:"Selesai",value:stats.selesai,icon:"✅",bg:"linear-gradient(135deg,#16a34a,#22c55e)"},
        ].map(s=>(
          <div key={s.label} className="card-hover" style={{background:s.bg,borderRadius:18,padding:"18px 16px",color:"white"}}>
            <div style={{fontSize:24,marginBottom:4}}>{s.icon}</div>
            <div style={{fontSize:32,fontWeight:900}}>{s.value}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.8)",fontWeight:600}}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{...card,padding:20,marginBottom:16}}>
        <div style={{fontWeight:800,fontSize:15,color:"#1f2937",marginBottom:14}}>Cara Kerja SI-CEKAT</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:14}}>
          {[{icon:"📱",title:"Scan / Akses",desc:"Scan QR Code atau akses via portal"},
            {icon:"📝",title:"Isi Laporan",desc:"Pilih kategori & deskripsikan masalah"},
            {icon:"🔔",title:"Proses Otomatis",desc:"Tim respon cepat notifikasi"},
            {icon:"⭐",title:"Selesai & Rating",desc:"Nilai kualitas penanganan"},
          ].map(s=>(

        </div>
      </div>
      <div style={{...card,overflowX:"auto"}}>
        <div style={{padding:"16px 18px",borderBottom:"1px solid #f3f4f6",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:700,fontSize:14,color:"#1f2937"}}>Rekap Seluruh Laporan</div>
          <div style={{fontSize:11,color:"#9ca3af"}}>{tickets.length} tiket total</div>
        </div>
        <table>
          <thead style={{background:"#f9fafb"}}>
            <tr>{["ID Tiket","Pelapor","Kategori","Lokasi","Tanggal","Status","Rating"].map(h=>(
              <th key={h} style={{padding:"10px 14px",fontSize:11,fontWeight:700,color:"#6b7280"}}>{h}</th>
            ))}</tr>
          </thead>
          <tbody>
            {tickets.map(t=>(
              <tr key={t.id} style={{borderTop:"1px solid #f3f4f6"}}>
                <td style={{padding:"10px 14px",fontFamily:"monospace",fontSize:10,color:"#9ca3af"}}>{t.id}</td>
                <td style={{padding:"10px 14px"}}><div style={{fontSize:12,fontWeight:700,color:"#1f2937"}}>{t.reporter}</div><div style={{fontSize:10,color:"#9ca3af"}}>{t.role}</div></td>
                <td style={{padding:"10px 14px",fontSize:12}}>{CAT_ICON[t.category]} {t.category}</td>
                <td style={{padding:"10px 14px",fontSize:12,color:"#4b5563"}}>{t.room}</td>
                <td style={{padding:"10px 14px",fontSize:11,color:"#9ca3af"}}>{t.created}</td>
                <td style={{padding:"10px 14px"}}><StatusBadge status={t.status}/></td>
                <td style={{padding:"10px 14px",fontSize:13,color:"#d97706",fontWeight:700}}>{t.rating?"★".repeat(t.rating)+"☆".repeat(5-t.rating):"—"}</td>
              </tr>
            ))}
            {tickets.length===0&&<tr><td colSpan={7} style={{padding:30,textAlign:"center",color:"#9ca3af",fontSize:13}}>Belum ada data laporan</td></tr>}
          </tbody>
        </table>
      </div>
    </div>}

    </div>

    <div style={{borderTop:"1px solid #e5e7eb",background:"white",marginTop:32}}>
      <div style={{maxWidth:900,margin:"0 auto",padding:"14px 16px",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:11,color:"#9ca3af"}}><strong style={{color:"#4b5563"}}>SI-CEKAT</strong> © 2026 · SMAN 1 Balongpanggang · Kabupaten Gresik</div>
        <div style={{fontSize:11,color:"#9ca3af"}}>v2.0 — Data tersimpan lokal</div>
      </div>
    </div>
  </>;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
